# mock-x — X fixture connector (SourceKind Mock; loaded ONLY when ENABLED_SOURCES
# lists it). No network, no credentials — feeds the `x` surface with the
# same envelope shape as the live `x` connector, keeping tests and e2e
# hermetic. Read-only: the only tool is magnis.sync.fetch.

id = "mock-x"
version = "1.0.0"
title = "Mock X"
summary = "X fixture source for tests and e2e."
publisher = "ai.magnis"
dev = true
surfaces = ["x"]
kind = "mock"
account_mode = "single"
accounts = ["default"]

[sync]
mode = "poll"
