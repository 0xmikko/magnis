name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck (11 module packages)
        run: bun run typecheck
      - name: Module + SDK tests
        run: bun run test
      - name: Connector tests
        run: bun run test:connectors
      - name: Tooling tests
        run: bun run test:scripts
      - name: Bundle smoke
        run: bun run build:plugins

  rust-connectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  catalog:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [typescript, rust-connectors]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun scripts/build-plugins.ts
      - run: bun scripts/build-catalog-index.ts
        env:
          GITHUB_SHA: ${{ github.sha }}
      - name: Publish catalog branch
        run: |
          cd catalog
          git init -q -b catalog
          git config user.name "magnis-catalog-bot"
          git config user.email "catalog@magnis.ai"
          git add -A
          git commit -qm "catalog: ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" catalog:catalog
