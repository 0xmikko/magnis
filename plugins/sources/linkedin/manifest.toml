# linkedin — read-only LinkedIn source connector via anysite.io (DEC-1/13).
# bun/TS stdio MCP server. Feeds the `linkedin` surface with profile + post
# envelopes for TRACKED handles only (DEC-8 / INV-1). Read-only (INV-5):
# only magnis.sync.fetch. See README.md for endpoints + the S4 spike.
#
# Auth: anysite `access-token` header (DEC-5). The host injects `anysite_key`
# per call via _meta, from SOURCE_LINKEDIN_ANYSITE_KEY (DEC-6). initialize is
# cred-less (DEC-7).
#
# Catalog availability is gated to `available=false` until the S4 spike confirms
# pricing/rate/coverage (DEC-13); see backend/data/extensions.toml.

[source]
id = "linkedin"
version = "1.0.0"
surfaces = ["linkedin"]
transport = "stdio"
account_mode = "single"
kind = "plugin"

[auth]
type = "shared_provider"

[credentials]
# anysite_key is an app-cred; the label opts it into Settings → Sources
# (source-keys DEC-1); resolution: vault → env.
keys = [
  { name = "anysite_key", label = "Anysite API key", help_url = "https://anysite.io/dashboard", description = "Magnis uses anysite.io to fetch LinkedIn profiles and posts of the people you track. Requests are billed to your anysite account." },
]
inject = "meta"

[spawn]
command = "bun"
args = ["run", "src/main.ts"]

[profile]
mode = "poll"
interval_secs = 600

# Declared install (extensions-lifecycle DEC-L4): host-standard routine.
[lifecycle]
install = "standard"

# Self-reporting catalog presentation (extensions-lifecycle DEC-L3).
[presentation]
icon_url = "/api/plugins/linkedin/ui/icon.svg"
title = "LinkedIn"
summary = "Sync posts from the LinkedIn people you track (via anysite)."
publisher = "Magnis"
publisher_url = "https://magnis.ai"
details = """
# LinkedIn

Read-only, via anysite.io. Pulls profiles and recent posts for the LinkedIn
people you opt in to tracking. Only tracked handles are fetched.

Availability is pending a provider spike (pricing / rate / coverage); see the
connector README. Set `SOURCE_LINKEDIN_ANYSITE_KEY` once enabled.

- Opt-in per contact; untracked handles are never fetched
- Feeds the LinkedIn module (profiles + posts)
"""
