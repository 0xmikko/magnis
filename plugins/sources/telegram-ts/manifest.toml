# telegram — Telegram source (external MCP connector).
#
# Ported faithfully out of the in-backend `backend/src/sources/telegram` source.
# Feeds ONE surface (telegram) with the same canonical envelopes the in-core
# source produced, so the telegram module ingests it unchanged.
#
# The server is the `magnis-telegram` binary. The connector builds its own
# grammers MTProto client: the host injects `_meta = { api_id, api_hash, session }`
# on every tool call. Telegram is a PUSH source — after `magnis.sync.listen` the
# connector emits live `notifications/magnis/envelope` messages.
#
# For isolated e2e (no live Telegram), set TELEGRAM_FIXTURE_FILE to a JSON
# fixture; the connector then serves fetch from the file with NO MTProto network.

[source]
id = "telegram-ts"
version = "1.0.0"
surfaces = ["telegram"]
transport = "stdio"
kind = "plugin"

# Per-source authorization (DEC-15/16/24). phone_code: a multi-step MTProto login
# driven over WS (no OAuth/callback). The host stashes the user-typed phone / login
# code / 2FA password and injects them per `magnis.auth.begin` / `magnis.auth.step`
# call (DEC-24) alongside the app-creds `api_id`/`api_hash` (env
# `SOURCE_TELEGRAM_API_ID` / `SOURCE_TELEGRAM_API_HASH`). The connector mints the
# `session` credential; the host stores it keyed by connection_id. The connector's
# `phone_code_hash` + interim grammers session round-trip via the host session
# (the auth connector is cred-less one-per-call, DEC-21). Browser screen below.
[auth]
type = "phone_code"
ui = "auth/screen.tsx"

[spawn]
command = "bun"
args = ["run", "src/main.ts"]
# env injected by the operator / launch scripts (real mode needs none — creds
# arrive per-call via `_meta`):
#   TELEGRAM_FIXTURE_FILE = "<path>/telegram-fixture.json"   # optional, e2e replay

[credentials]
keys = ["api_id", "api_hash", "session"]
minted = ["session"]
inject = "meta"

[profile]
mode = "push"

# Declared install (extensions-lifecycle DEC-L4): host-standard routine.
[lifecycle]
install = "standard"

# Self-reporting catalog presentation (extensions-lifecycle DEC-L3).
[presentation]
icon_url = "/api/extension-icons/telegram.svg"
title = "Telegram (TS)"
summary = "Sync chats, groups, and contacts from Telegram."
publisher = "Magnis"
publisher_url = "https://magnis.ai"
details = """
# Telegram

Connect Telegram via MTProto to sync private chats, groups, and
contacts into your graph. Pairs with the Telegram Messages module.
"""
