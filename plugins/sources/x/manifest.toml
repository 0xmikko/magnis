# x — read-only X (Twitter) source connector. bun/TS stdio MCP server
# speaking the Magnis Sync Profile. Feeds the `x` surface with profile +
# post envelopes, fetching only the handles the user explicitly tracks.
#
# READ-ONLY: the only tool is magnis.sync.fetch (provided by the SDK).
# No write tools, no magnis.execute, no source_commands.
#
# Auth: app-only Bearer token. The host resolves it (vault, then the
# SOURCE_X_BEARER_TOKEN env var) and injects `bearer_token` per call via
# _meta — the connector never stores credentials. initialize is
# credential-less: a missing key fails at fetch, never at registration.

id = "x"
version = "1.0.0"
title = "X"
summary = "Sync posts from the X (Twitter) accounts you track."
publisher = "ai.magnis"
surfaces = ["x", "contacts"]
account_mode = "single"

[auth]
type = "api_key"

[credentials]
# bearer_token is an app-cred (host-injected), NOT minted by an auth flow →
# `minted` stays empty. Injected per-call via _meta (the default). The label
# makes it editable in Settings → Sources; resolution: vault → env.
keys = [
  { name = "bearer_token", label = "API bearer token", help_url = "https://developer.x.com/en/portal/dashboard", description = "Magnis uses the X API to fetch posts and profiles of the accounts you track. An app-only bearer token from your X developer portal is required." },
]

[sync]
mode = "poll"
interval_secs = 300
