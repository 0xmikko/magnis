# Shipped-default Cat-M module config (credentials-model §5.4, layer 1).
#
# These are the module's OWN default OAuth values, bundled WITH the module for
# local-first out-of-the-box use. Google permits disclosing localhost-flow
# client credentials, so committing the localhost project's client_id/secret
# here is safe. A server/enterprise deploy OVERRIDES these via the encrypted
# vault (subject "__deployment__", set by an admin through source.appconfig.set)
# — that override lives in the DB, outside the module tree, so CI/CD updates to
# this file never clobber the deployment's real credentials.
#
# The manifest declares only the key NAMES; the VALUES live here.
# Populate with the localhost-registered Google project's credentials:
[credentials.default]
# client_id = "<localhost-project>.apps.googleusercontent.com"
# client_secret = "<localhost-secret>"
