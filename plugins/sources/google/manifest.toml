# google — Gmail + Google Calendar + Google Contacts source (TypeScript).
#
# Ported faithfully from the former Rust `google` connector (itself a
# port of the in-backend `backend/src/sources/google` source). Feeds three
# surfaces (email + meetings + contacts) with canonical envelopes the
# corresponding modules ingest unchanged — wire parity with the Rust connector
# is the invariant (the host must not tell the difference).
#
# The connector does OAuth itself: the host injects
# `_meta = { refresh_token, client_id, client_secret }` on every tool call, the
# connector refreshes an access token and calls the Gmail / Calendar REST API.
# Account discovery is host-side; no static accounts.
#
# For isolated e2e (no live Google), set GOOGLE_FIXTURE_FILE to a JSON fixture;
# the connector then serves fetch from the file with NO network and NO OAuth.
# (env is injected by the operator / launch scripts — real mode needs none;
# creds arrive per-call via `_meta`.)

id = "google"
version = "1.0.0"
title = "Google"
summary = "Sync Gmail and Google Calendar into your personal graph."
publisher = "ai.magnis"
surfaces = ["email", "meetings", "contacts"]

# Per-source authorization (DEC-15/16/26). OAuth2: the HOST owns the ceremony
# (state/PKCE-S256/nonce/consent URL) using the scopes below + a fixed redirect
# `/auth/sources/google/callback`; the connector only runs `magnis.auth.exchange`
# (code→token + id_token validation). `client_id`/`client_secret` come from env
# `SOURCE_GOOGLE_CLIENT_ID` / `SOURCE_GOOGLE_CLIENT_SECRET` (server) — never the
# browser/isolate (CON-3). The browser screen is `auth/index.tsx` (convention).
[auth]
type = "oauth2"

[auth.oauth2]
auth_url = "https://accounts.google.com/o/oauth2/v2/auth"
# Must match what the Gmail/Calendar/Contacts surfaces need at sync time.
scopes = [
  "openid",
  "email",
  "https://www.googleapis.com/auth/gmail.readonly",
  "https://www.googleapis.com/auth/gmail.send",
  "https://www.googleapis.com/auth/calendar.readonly",
  "https://www.googleapis.com/auth/contacts.readonly",
]

[credentials]
keys = ["refresh_token", "client_id", "client_secret"]
minted = ["refresh_token"]

[sync]
mode = "poll"
