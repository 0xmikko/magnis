# file — Files domain module (V8 plugin).
#
# Owns `file.*`: the file-object entity plus image / audio / video facets. This is
# the graph + attachment surface only — the host FileService owns the bytes and
# storage; the module lists, gets, and attaches files (link kind `attachment`).
# Sandboxed V8 isolate; presence-seeded at boot (DEC-10).

id = "file"
version = "0.1.0"
# SDK contract version this manifest targets (host accepts 0.x).
magnis_api_version = "0.1.0"
title = "Files"
summary = "Documents and attachments from your sources, in one place."
# Reverse-domain publisher identity.
publisher = "ai.magnis"

# Foreign asks beyond the implicit own namespace: writes to `file.` facets,
# own:own links, and reads of own schemas need no declaration.
[permissions]
links = [ "attachment" ]
