# email — Email domain module (V8 plugin).
#
# Owns `email.*`: message + address entities and their facets. The graph-side half
# of email — the email SOURCE connector feeds the `email` sync surface this module
# ingests. Sends and replies through the host composer + source-command op grants,
# registers attachments as files, and creates triggers over RPC. Sandboxed V8
# isolate; bundled with the app and installed automatically at boot.

id = "email"
version = "0.1.0"
# SDK contract version this manifest targets (host accepts 0.x).
magnis_api_version = "0.1.0"
title = "Email"
summary = "Ingest, search, and act on email threads from any provider."
# Reverse-domain publisher identity.
publisher = "ai.magnis"

# Sync surface this module consumes (fed by the matching source connector).
[surfaces.email]
# The surface's primary-item schema — its user-scoped graph count IS the
# "items synced" badge (host source.status.list reads this).
item = "email.message"

# Foreign asks beyond the implicit own namespace: writes to `email.` facets,
# own:own links, and reads of own schemas need no declaration.
[permissions]
links = [ "sent_from", "sent_to", "attachment" ]
call = [ "triggers.create" ]
host = [ "file_register", "external_id_reads", "source_commands", "sync_state", "composer" ]
